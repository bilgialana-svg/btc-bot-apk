name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses-dev \
          cmake libffi-dev libssl-dev \
          build-essential gettext \
          autopoint automake libltdl-dev
    
    - name: Install Python Packages
      run: |
        pip install --upgrade pip
        pip install --upgrade buildozer
        pip install cython==0.29.36
    
    - name: Pre-Accept Android SDK Licenses
      run: |
        # Buildozer'in indirecegi yere klasor olustur
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        
        # Tum lisanslari onceden kabul et
        cat > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license <<'EOF'
        
        8933bad161af4178b1185d1a37fbf41ea5269c55
        d56f5187479451eabf01fb78af6dfcb131a6481e
        24333f8a63b6825ea9c5514f83c2829b004d1fee
        EOF
        
        cat > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license <<'EOF'
        
        84831b9409646a918e30573bab4c9c91346d8abd
        504667f4c0de7af1a06de9f4b1727b84351f2910
        EOF
        
        cat > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license <<'EOF'
        
        859f317696f67ef3d7f30a50a5560e7834b43903
        EOF
        
        cat > ~/.buildozer/android/platform/android-sdk/licenses/google-gdk-license <<'EOF'
        
        33b6a2b64607f11b759f320ef9dff4ae5c47d97a
        EOF
        
        cat > ~/.buildozer/android/platform/android-sdk/licenses/intel-android-extra-license <<'EOF'
        
        d975f751698a77b662f1254ddbeed3901e976f5a
        EOF
        
        cat > ~/.buildozer/android/platform/android-sdk/licenses/mips-android-sysimage-license <<'EOF'
        
        e9acab5b5fbb560a72cfaecce8946896ff6aab9d
        EOF
        
        echo "=== Lisanslar olusturuldu ==="
        ls -la ~/.buildozer/android/platform/android-sdk/licenses/
    
    - 
